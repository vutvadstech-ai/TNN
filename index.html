<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng Xếp Hạng NTĐ</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#a8edea,#fed6e3);
}

h1{
text-align:center;
font-size:42px;
color:#ff2e63;
margin:20px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
margin-bottom:20px;
}

/* input */

input{
width:65px;
padding:6px;
border-radius:8px;
border:1px solid #ddd;
margin:3px;
}

button{
padding:8px 14px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:bold;
}

.addBtn{background:#2ecc71;color:white}
.editBtn{background:#f39c12;color:white}
.deleteBtn{background:#e74c3c;color:white}

/* podium */

.podium{
display:flex;
justify-content:center;
align-items:flex-end;
gap:25px;
margin-bottom:30px;
}

.podiumBox{
text-align:center;
padding:15px;
border-radius:15px;
color:white;
font-weight:bold;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
transform:perspective(500px) rotateX(10deg);
}

.first{
background:linear-gradient(45deg,gold,orange);
height:170px;
width:140px;
font-size:20px;
}

.second{
background:linear-gradient(45deg,silver,#bbb);
height:130px;
width:120px;
}

.third{
background:linear-gradient(45deg,#cd7f32,#e0a96d);
height:110px;
width:110px;
}

/* leaderboard */

.player{
display:flex;
align-items:center;
padding:12px;
margin-bottom:10px;
border-radius:12px;
background:#f7f7f7;
}

.rank{width:40px;font-weight:bold}
.name{flex:1}
.icons{flex:2}
.score{width:80px;text-align:right;font-weight:bold}
.actions{width:120px;text-align:right}

/* popup edit */

#editModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modalContent{
background:white;
padding:25px;
border-radius:18px;
text-align:center;
}

.modalContent input{
width:70px;
margin:5px;
}

/* loading popup */

#loadingBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.loadingContent{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
font-size:22px;
}

canvas{
max-height:350px;
}

</style>
</head>

<body>

<h1>🏆 Bảng Xếp Hạng NTĐ</h1>

<div class="container">

<div class="card">

Tên
<input id="name">

🌿 <input type="number" id="leaf" value="0">
🌸 <input type="number" id="flower" value="0">
🍇 <input type="number" id="fruit" value="0">
🌳 <input type="number" id="tree" value="0">
📖 <input type="number" id="book" value="0">
🗺️ <input type="number" id="map" value="0">

<button class="addBtn" onclick="addPlayer()">💾 Lưu</button>

</div>

<div class="podium" id="podium"></div>

<div class="card">
<div id="list"></div>
</div>

<div class="card">
<h3>📊 Biểu đồ điểm</h3>
<canvas id="chart"></canvas>
</div>

</div>

<!-- EDIT POPUP -->

<div id="editModal">
<div class="modalContent">

<h3>✏️ Sửa dữ liệu</h3>

🌿 <input id="e_leaf" type="number"><br>
🌸 <input id="e_flower" type="number"><br>
🍇 <input id="e_fruit" type="number"><br>
🌳 <input id="e_tree" type="number"><br>
📖 <input id="e_book" type="number"><br>
🗺️ <input id="e_map" type="number"><br>

<br>

<button class="addBtn" onclick="saveEdit()">💾 Lưu</button>
<button onclick="closeEdit()">Đóng</button>

</div>
</div>

<!-- LOADING -->

<div id="loadingBox">
<div class="loadingContent">

💾 Đang lưu dữ liệu lên Drive...

<br><br>

⏳ <span id="timer">10</span>s

</div>
</div>

<script>

const API_URL="PUT_YOUR_SCRIPT_URL_HERE"

let players=[]
let scoreChart=null
let editIndex=null
let lastTop1=null

function calcScore(p){
return p.leaf*1+p.flower*50+p.fruit*500+p.tree*1000+p.book*20+p.map*5
}

function icons(p){
return "🌿".repeat(p.leaf)+"🌸".repeat(p.flower)+"🍇".repeat(p.fruit)+"🌳".repeat(p.tree)+"📖".repeat(p.book)+"🗺️".repeat(p.map)
}

function findPlayer(name){
return players.find(p=>p.name.toLowerCase()==name.toLowerCase())
}

/* loading */

function showLoading(){

let box=document.getElementById("loadingBox")
let timer=document.getElementById("timer")

box.style.display="flex"

let t=10
timer.innerText=t

let interval=setInterval(()=>{

t--
timer.innerText=t

if(t<=0) clearInterval(interval)

},1000)

}

function hideLoading(){

document.getElementById("loadingBox").style.display="none"

}

/* drive */

async function loadDrive(){

let res=await fetch(API_URL)
let data=await res.json()

if(Array.isArray(data)){

players=data
players.forEach(p=>p.score=calcScore(p))

render()

}

}

async function saveDrive(){

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(players)
})

}

/* player */

function addPlayer(){

let name=document.getElementById("name").value.trim()

if(!name) return

let data={
leaf:+leaf.value,
flower:+flower.value,
fruit:+fruit.value,
tree:+tree.value,
book:+book.value,
map:+map.value
}

let p=findPlayer(name)

if(p){

p.leaf+=data.leaf
p.flower+=data.flower
p.fruit+=data.fruit
p.tree+=data.tree
p.book+=data.book
p.map+=data.map

}else{

p={name,...data}
players.push(p)

}

p.score=calcScore(p)

render()
saveDrive()

}

function openEdit(i){

editIndex=i

let p=players[i]

e_leaf.value=p.leaf
e_flower.value=p.flower
e_fruit.value=p.fruit
e_tree.value=p.tree
e_book.value=p.book
e_map.value=p.map

editModal.style.display="flex"

}

function closeEdit(){

editModal.style.display="none"

}

async function saveEdit(){

let p=players[editIndex]

p.leaf=+e_leaf.value
p.flower=+e_flower.value
p.fruit=+e_fruit.value
p.tree=+e_tree.value
p.book=+e_book.value
p.map=+e_map.value

p.score=calcScore(p)

closeEdit()

render()

showLoading()

await saveDrive()

setTimeout(async()=>{

await loadDrive()
hideLoading()

},10000)

}

function deletePlayer(i){

let pass=prompt("Password xoá")

if(pass!="111111") return

players.splice(i,1)

render()
saveDrive()

}

/* render */

function render(){

players.sort((a,b)=>b.score-a.score)

if(lastTop1 && players[0] && players[0].name!=lastTop1){

confetti({
particleCount:200,
spread:120
})

}

lastTop1=players[0]?.name

drawPodium()
drawList()
drawChart()

}

function drawPodium(){

let p=document.getElementById("podium")

p.innerHTML=""

if(players[1])
p.innerHTML+=`<div class="podiumBox second">🥈<br>${players[1].name}<br>${players[1].score}</div>`

if(players[0])
p.innerHTML+=`<div class="podiumBox first">👑<br>${players[0].name}<br>${players[0].score}</div>`

if(players[2])
p.innerHTML+=`<div class="podiumBox third">🥉<br>${players[2].name}<br>${players[2].score}</div>`

}

function drawList(){

let html=""

players.forEach((p,i)=>{

html+=`

<div class="player">

<div class="rank">#${i+1}</div>

<div class="name">${p.name}</div>

<div class="icons">${icons(p)}</div>

<div class="score">${p.score}</div>

<div class="actions">

<button class="editBtn" onclick="openEdit(${i})">✏️</button>
<button class="deleteBtn" onclick="deletePlayer(${i})">❌</button>

</div>

</div>

`

})

document.getElementById("list").innerHTML=html

}

function drawChart(){

let ctx=document.getElementById("chart")

let labels=players.map(p=>p.name)
let scores=players.map(p=>p.score)

if(scoreChart) scoreChart.destroy()

scoreChart=new Chart(ctx,{
type:'bar',
data:{
labels:labels,
datasets:[{data:scores}]
},
options:{plugins:{legend:{display:false}}}
})

}

loadDrive()

setInterval(loadDrive,5000)

</script>

</body>
</html>
