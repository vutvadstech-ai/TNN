<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BẢNG XẾP HẠNG</title>

<style>

body{
margin:0;
font-family:'Times New Roman',serif;
background:linear-gradient(135deg,#a8edea,#fed6e3);
overflow-x:hidden;
}

h1{
text-align:center;
padding:20px;
font-size:40px;
color:#ff2e63;
letter-spacing:2px;
}

.sticker{
position:fixed;
font-size:24px;
opacity:0.3;
animation:float 10s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:20px;
padding:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

input{
width:60px;
padding:6px;
margin:5px;
border-radius:8px;
border:1px solid #ddd;
}

button{
padding:8px 12px;
border-radius:8px;
border:none;
margin:2px;
cursor:pointer;
}

.addBtn{background:#4CAF50;color:white;}
.editBtn{background:orange;}
.deleteBtn{background:red;color:white;}

.player{
display:flex;
align-items:center;
padding:12px;
border-radius:15px;
margin-bottom:10px;
background:#f9f9f9;
}

.rank{width:50px;font-weight:bold;}
.name{flex:1;}
.icons{flex:2;}
.score{width:80px;text-align:right;font-weight:bold;}
.actions{width:120px;text-align:right;}
.badge{margin-left:10px;font-size:18px;}

.top1{
background:linear-gradient(45deg,gold,orange);
box-shadow:0 0 20px gold;
}

.top2{
background:linear-gradient(45deg,silver,#ddd);
}

.top3{
background:linear-gradient(45deg,#cd7f32,#e0a96d);
}

.animateTop1{
animation:bounce 0.6s ease;
}

@keyframes bounce{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

</style>
</head>

<body>

<h1>🏆 BẢNG XẾP HẠNG CÙNG NHAU KÉO TIẾN NTĐ</h1>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<div class="sticker" style="left:10%">🎉</div>
<div class="sticker" style="left:25%">🌟</div>
<div class="sticker" style="left:40%">🔥</div>
<div class="sticker" style="left:55%">💖</div>
<div class="sticker" style="left:70%">🏆</div>
<div class="sticker" style="left:85%">✨</div>

<div class="container">

<div class="card">

Tên:
<input id="name">

🌿 <input type="number" id="leaf" value="0">
🌸 <input type="number" id="flower" value="0">
🍇 <input type="number" id="fruit" value="0">
🌳 <input type="number" id="tree" value="0">
📖 <input type="number" id="book" value="0">
🗺️ <input type="number" id="map" value="0">

<br><br>

<button class="addBtn" id="addBtn">➕ Thêm / Cộng dồn</button>

</div>

<div id="list"></div>

</div>

<script>

const PASSWORD="111111"

const listEl=document.getElementById("list")

const nameInput=document.getElementById("name")
const leafInput=document.getElementById("leaf")
const flowerInput=document.getElementById("flower")
const fruitInput=document.getElementById("fruit")
const treeInput=document.getElementById("tree")
const bookInput=document.getElementById("book")
const mapInput=document.getElementById("map")

let players=[]
let lastTop1=null

try{
players=JSON.parse(localStorage.getItem("players")||"[]")
}catch(e){
players=[]
}

if(players.length) lastTop1=players[0].name

function save(){
localStorage.setItem("players",JSON.stringify(players))
}

function num(v){
v=parseInt(v)
return isNaN(v)||v<0?0:v
}

function calcScore(p){
return p.leaf*1+p.flower*50+p.fruit*500+p.tree*1000+p.book*20+p.map*5
}

function icons(p){

function limit(icon,count){
count=Math.min(count,20)
return icon.repeat(count)
}

return limit("🌿",p.leaf)+
limit("🌸",p.flower)+
limit("🍇",p.fruit)+
limit("🌳",p.tree)+
limit("📖",p.book)+
limit("🗺️",p.map)

}

function badge(i){

if(i===0) return "👑 Quán quân"
if(i===1) return "🥈 Á quân"
if(i===2) return "🥉 Top 3"

return "💪 Cố gắng"

}

function findPlayer(name){

return players.find(
p=>p.name.toLowerCase()===name.toLowerCase()
)

}

function addPlayer(){

const name=nameInput.value.trim()

if(!name){
alert("Nhập tên")
return
}

const data={
leaf:num(leafInput.value),
flower:num(flowerInput.value),
fruit:num(fruitInput.value),
tree:num(treeInput.value),
book:num(bookInput.value),
map:num(mapInput.value)
}

let p=findPlayer(name)

if(p){

p.leaf+=data.leaf
p.flower+=data.flower
p.fruit+=data.fruit
p.tree+=data.tree
p.book+=data.book
p.map+=data.map

}else{

p={name,...data}
players.push(p)

}

p.score=calcScore(p)

save()
render()

leafInput.value=0
flowerInput.value=0
fruitInput.value=0
treeInput.value=0
bookInput.value=0
mapInput.value=0

}

function editPlayer(i){

let p=players[i]

let v1=prompt("🌿",p.leaf)
let v2=prompt("🌸",p.flower)
let v3=prompt("🍇",p.fruit)
let v4=prompt("🌳",p.tree)
let v5=prompt("📖",p.book)
let v6=prompt("🗺️",p.map)

if(v1!==null)p.leaf=num(v1)
if(v2!==null)p.flower=num(v2)
if(v3!==null)p.fruit=num(v3)
if(v4!==null)p.tree=num(v4)
if(v5!==null)p.book=num(v5)
if(v6!==null)p.map=num(v6)

p.score=calcScore(p)

save()
render()

}

function deletePlayer(i){

let pass=prompt("Nhập mật khẩu để xoá")

if(pass!==PASSWORD){
alert("Sai mật khẩu")
return
}

if(confirm("Xoá người chơi này?")){

players.splice(i,1)
save()
render()

}

}

function render(){

players.forEach(p=>p.score=calcScore(p))

players.sort((a,b)=>b.score-a.score)

let html=""

players.forEach((p,i)=>{

let cls=i===0?"top1":i===1?"top2":i===2?"top3":""
let anim=(i===0 && p.name!==lastTop1)?"animateTop1":""

html+=`
<div class="player ${cls} ${anim}">
<div class="rank">#${i+1}</div>

<div class="name">
${p.name}
<span class="badge">${badge(i)}</span>
</div>

<div class="icons">${icons(p)}</div>

<div class="score">${p.score}</div>

<div class="actions">
<button class="editBtn" onclick="editPlayer(${i})">✏️</button>
<button class="deleteBtn" onclick="deletePlayer(${i})">❌</button>
</div>

</div>
`

})

listEl.innerHTML=html

if(players.length) lastTop1=players[0].name

}

document.getElementById("addBtn").onclick=addPlayer

render()

</script>

</body>
</html>
