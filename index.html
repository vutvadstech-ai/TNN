<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BẢNG XẾP HẠNG NTĐ</title>

<style>
body{
margin:0;
font-family:"Times New Roman";
background:linear-gradient(135deg,#a8edea,#fed6e3);
}

h1{
text-align:center;
font-size:40px;
color:#ff2e63;
margin:20px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
margin-bottom:20px;
}

input{
width:60px;
padding:6px;
border-radius:8px;
border:1px solid #ddd;
}

button{
padding:8px 12px;
border-radius:8px;
border:none;
cursor:pointer;
}

.addBtn{background:#4CAF50;color:white}
.editBtn{background:orange}
.deleteBtn{background:red;color:white}

.player{
display:flex;
align-items:center;
padding:12px;
margin-bottom:10px;
border-radius:15px;
background:#f9f9f9;
}

.rank{width:50px;font-weight:bold}
.name{flex:1}
.icons{flex:2}
.score{width:100px;text-align:right;font-weight:bold}
.actions{width:120px;text-align:right}

.top1{
background:linear-gradient(45deg,gold,orange);
box-shadow:0 0 20px gold;
}

.top2{
background:linear-gradient(45deg,silver,#ddd);
}

.top3{
background:linear-gradient(45deg,#cd7f32,#e0a96d);
}

.badge{
margin-left:10px;
font-size:18px;
}
</style>

</head>

<body>

<h1>🏆 BẢNG XẾP HẠNG CÙNG NHAU KÉO TIẾN NTĐ</h1>

<div class="container">

<div class="card">

Tên
<input id="name">

🌿 <input type="number" id="leaf" value="0">
🌸 <input type="number" id="flower" value="0">
🍇 <input type="number" id="fruit" value="0">
🌳 <input type="number" id="tree" value="0">
📖 <input type="number" id="book" value="0">
🗺️ <input type="number" id="map" value="0">

<br><br>

<button class="addBtn" onclick="addPlayer()">💾 Lưu</button>

</div>

<div id="list"></div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycby6UviLXwOXBUCGFlEhEZVSwK4W7h9zEaVG0o4D4yWIapDv3CF4nMp39KOseqI6jePg3w/exec"

let players=[]
let loading=false

const listEl=document.getElementById("list")

function calcScore(p){
return p.leaf*1+p.flower*50+p.fruit*500+p.tree*1000+p.book*20+p.map*5
}

function icons(p){
return "🌿".repeat(p.leaf)
+"🌸".repeat(p.flower)
+"🍇".repeat(p.fruit)
+"🌳".repeat(p.tree)
+"📖".repeat(p.book)
+"🗺️".repeat(p.map)
}

function badge(i){
if(i==0)return"👑 Quán quân"
if(i==1)return"🥈 Á quân"
if(i==2)return"🥉 Top 3"
return"💪"
}

function findPlayer(name){
return players.find(p=>p.name.toLowerCase()==name.toLowerCase())
}

async function loadDrive(){

if(loading)return

loading=true

try{

const res=await fetch(API_URL)
const data=await res.json()

if(Array.isArray(data)&&data.length>0){

players=data

render()

}

}catch(e){

console.log("Drive load lỗi")

}

loading=false

}

async function saveDrive(){

try{

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(players)
})

}catch(e){

console.log("Save lỗi")

}

}

function addPlayer(){

const name=document.getElementById("name").value.trim()

if(!name)return

const newData={
leaf:+leaf.value,
flower:+flower.value,
fruit:+fruit.value,
tree:+tree.value,
book:+book.value,
map:+map.value
}

let p=findPlayer(name)

if(p){

p.leaf+=newData.leaf
p.flower+=newData.flower
p.fruit+=newData.fruit
p.tree+=newData.tree
p.book+=newData.book
p.map+=newData.map

}else{

p={name,...newData}

players.push(p)

}

p.score=calcScore(p)

render()

saveDrive()

}

function editPlayer(i){

let p=players[i]

let v1=prompt("🌿",p.leaf)
let v2=prompt("🌸",p.flower)
let v3=prompt("🍇",p.fruit)
let v4=prompt("🌳",p.tree)
let v5=prompt("📖",p.book)
let v6=prompt("🗺️",p.map)

if(v1!==null)p.leaf=+v1
if(v2!==null)p.flower=+v2
if(v3!==null)p.fruit=+v3
if(v4!==null)p.tree=+v4
if(v5!==null)p.book=+v5
if(v6!==null)p.map=+v6

p.score=calcScore(p)

render()

saveDrive()

}

function deletePlayer(i){

let pass=prompt("Nhập password xoá")

if(pass!="111111"){

alert("Sai password")

return

}

players.splice(i,1)

render()

saveDrive()

}

function render(){

players.sort((a,b)=>b.score-a.score)

let html=""

players.forEach((p,i)=>{

let cls=i==0?"top1":i==1?"top2":i==2?"top3":""

html+=`

<div class="player ${cls}">

<div class="rank">#${i+1}</div>

<div class="name">

${p.name}

<span class="badge">${badge(i)}</span>

</div>

<div class="icons">${icons(p)}</div>

<div class="score">${p.score}</div>

<div class="actions">

<button class="editBtn" onclick="editPlayer(${i})">✏️</button>

<button class="deleteBtn" onclick="deletePlayer(${i})">❌</button>

</div>

</div>

`

})

listEl.innerHTML=html

}

loadDrive()

setInterval(loadDrive,5000)

</script>

</body>
</html>
